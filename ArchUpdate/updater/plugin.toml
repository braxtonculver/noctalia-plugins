id = "braxtonculver/updater"
name = "Arch Updater"
version = "1.0.0"
plugin_api = 5
author = "braxtonculver"
license = "MIT"
dependencies = []
tags = ["system", "utility", "arch", "indicator"]
icon = "system"
description = "Automatic system updater for pacman, AUR helpers, and flatpak with update count display."

[[widget]]
id = "status"
entry = "widget.luau"

  [[widget.setting]]
  key = "show_count"
  type = "bool"
  label_key = "settings.show_count.label"
  description_key = "settings.show_count.description"
  default = true

[[service]]
id = "checker"
entry = "service.luau"

  [[service.setting]]
  key = "check_interval_minutes"
  type = "number"
  label_key = "settings.check_interval.label"
  description_key = "settings.check_interval.description"
  default = 30

[[panel]]
id = "updates"
entry = "panel.luau"
width = 440
height = 520
placement = "floating"
position = "center"
