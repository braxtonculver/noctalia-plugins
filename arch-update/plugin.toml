id = "braxtonculver/arch-update"
name = "Arch Updater"
version = "4.0.0"
plugin_api = 3
author = "braxtonculver"
license = "MIT"
dependencies = []
tags = ["system", "utility", "arch", "indicator"]
icon = "refresh"
description = "Automatic system updater for pacman, AUR helpers, and flatpak with update count display."

[[setting]]
key = "check_interval"
type = "int"
label_key = "settings.check_interval.label"
description_key = "settings.check_interval.description"
default = 360
min = 5
max = 1440

[[setting]]
key = "enable_aur"
type = "bool"
label_key = "settings.enable_aur.label"
description_key = "settings.enable_aur.description"
default = true

[[setting]]
key = "aur_helper"
type = "select"
label_key = "settings.aur_helper.label"
description_key = "settings.aur_helper.description"
default = "auto"
options = [
  { value = "auto", label_key = "settings.aur_helper.auto" },
  { value = "yay", label_key = "settings.aur_helper.yay" },
  { value = "paru", label_key = "settings.aur_helper.paru" },
]

[[setting]]
key = "enable_flatpak"
type = "bool"
label_key = "settings.enable_flatpak.label"
description_key = "settings.enable_flatpak.description"
default = true

[[widget]]
id = "status"
entry = "widget.luau"
label = "Arch Updater"

  [[widget.setting]]
  key = "show_count"
  type = "bool"
  label_key = "settings.show_count.label"
  description_key = "settings.show_count.description"
  default = true

  [[widget.setting]]
  key = "icon_glyph"
  type = "glyph"
  label_key = "settings.icon_glyph.label"
  description_key = "settings.icon_glyph.description"
  default = "refresh"

[[service]]
id = "checker"
entry = "service.luau"

[[panel]]
id = "updates"
entry = "panel.luau"
width = 440
height = 560
placement = "floating"
position = "center"
