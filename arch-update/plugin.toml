id = "braxtonculver/arch-update"
name = "Arch Updater"
version = "2.0.0"
plugin_api = 3
author = "braxtonculver"
license = "MIT"
dependencies = []
tags = ["system", "utility", "arch", "indicator"]
icon = "package-update"
description = "Automatic system updater for pacman, AUR helpers, and flatpak with update count display and package list."

[[setting]]
key = "check_interval"
type = "int"
label_key = "settings.check_interval.label"
description_key = "settings.check_interval.description"
default = 300
min = 30

[[widget]]
id = "status"
entry = "widget.luau"

  [[widget.setting]]
  key = "show_count"
  type = "bool"
  label_key = "settings.show_count.label"
  description_key = "settings.show_count.description"
  default = true

  [[widget.setting]]
  key = "icon_glyph"
  type = "glyph"
  label_key = "settings.icon_glyph.label"
  description_key = "settings.icon_glyph.description"
  default = "package-update"

[[service]]
id = "checker"
entry = "service.luau"

[[panel]]
id = "updates"
entry = "panel.luau"
width = 440
height = 560
placement = "floating"
position = "center"
