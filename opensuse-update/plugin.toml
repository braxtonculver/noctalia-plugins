id = "braxtonculver/opensuse-update"
name = "openSUSE Updater"
version = "3.0.0"
plugin_api = 3
author = "braxtonculver"
license = "MIT"
dependencies = []
tags = ["system", "utility", "opensuse", "zypper", "indicator"]
icon = "refresh"
description = "Automatic system updater for openSUSE (zypper) and flatpak with update count display."

[[setting]]
key = "auto_check"
type = "bool"
label_key = "settings.auto_check.label"
description_key = "settings.auto_check.description"
default = true

[[setting]]
key = "check_interval"
type = "int"
label_key = "settings.check_interval.label"
description_key = "settings.check_interval.description"
default = 360
min = 5
max = 1440

[[setting]]
key = "flatpak_enabled"
type = "bool"
label_key = "settings.flatpak_enabled.label"
description_key = "settings.flatpak_enabled.description"
default = true

[[widget]]
id = "status"
entry = "widget.luau"
label = "openSUSE Updater"

[[service]]
id = "checker"
entry = "service.luau"

[[panel]]
id = "updates"
entry = "panel.luau"
width = 440
height = 560
placement = "floating"
position = "center"
